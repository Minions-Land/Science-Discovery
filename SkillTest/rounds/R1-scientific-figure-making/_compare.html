<!doctype html>
<html><head><meta charset="utf-8"><title>R1.B scientific-figure-making A/B</title>
<style>
body{font-family:-apple-system,Helvetica,Arial,sans-serif;background:#f4f4f0;margin:0;padding:24px;color:#1a1a1a}
h1{font-size:20px;margin:0 0 18px}
h2{font-size:15px;margin:24px 0 8px;border-bottom:1px solid #d0c8b8;padding-bottom:4px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
.card{background:#fff;padding:10px;border:1px solid #d8d2c2;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.card h3{margin:0 0 8px;font-size:12px;font-weight:600;color:#444;letter-spacing:0.05em;text-transform:uppercase}
.card img{max-width:100%;display:block}
</style></head>
<body>
<h1>R1.B — scientific-figure-making (lighter skill) baseline vs candidate</h1>
<h2>Case 1 — bar / multi-method ablation</h2>
<div class="row">
<div class="card"><h3>BASELINE</h3><img src="case-bar/baseline.png"></div>
<div class="card"><h3>CANDIDATE</h3><img src="case-bar/candidate.png"></div>
</div>
<h2>Case 2 — heatmap / cross-condition z-score</h2>
<div class="row">
<div class="card"><h3>BASELINE</h3><img src="case-heatmap/baseline.png"></div>
<div class="card"><h3>CANDIDATE</h3><img src="case-heatmap/candidate.png"></div>
</div>
<h2>Case 3 — multi-panel composite</h2>
<div class="row">
<div class="card"><h3>BASELINE</h3><img src="case-multi-panel/baseline.png"></div>
<div class="card"><h3>CANDIDATE</h3><img src="case-multi-panel/candidate.png"></div>
</div>
</body></html>
